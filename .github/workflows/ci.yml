name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, vault-service, audit-service, gateway]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: securevault
          POSTGRES_USER: securevault
          POSTGRES_PASSWORD: securevault
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U securevault"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ matrix.service }}-${{ hashFiles(format('{0}/**/*.gradle', matrix.service)) }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.service }}-

      - name: Build and test ${{ matrix.service }}
        working-directory: ${{ matrix.service }}
        run: ./gradlew build --no-daemon

  frontend-react:
    name: Build React App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/react-app/package-lock.json

      - name: Install and build
        working-directory: frontend/react-app
        run: |
          npm ci
          npm run build

  frontend-angular:
    name: Build Angular Admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/angular-admin/package-lock.json

      - name: Install and build
        working-directory: frontend/angular-admin
        run: |
          npm ci
          npm run build
